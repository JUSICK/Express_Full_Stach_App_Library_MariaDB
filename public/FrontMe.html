<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .profile-box {
            background: white;
            padding: 25px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .info {
            margin-bottom: 15px;
        }

        .info label {
            font-weight: bold;
            display: block;
        }

        .info span {
            display: block;
            margin-top: 3px;
            color: #333;
        }

        .logoutBtn {
            width: 100%;
            padding: 10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        .libraryBtn {
            width: 100%;
            padding: 10px;
            background: #ffffffe7;
            color: rgb(0, 0, 0);
            border: 2px;
            border-radius: 5px;
            border-color: #000000;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #e3e3e3;
        }
    </style>
</head>
<body>

<div class="profile-box">
    <h2>Your Profile</h2>
    <h3 id="welcome"></h3>

    <div class="info">
        <label>ID:</label>
        <span id="id">Loading...</span>
    </div>

    <div class="info">
        <label>Username:</label>
        <span id="username">Loading...</span>
    </div>

    <div class="info">
        <label>Email:</label>
        <span id="email">Loading...</span>
    </div>

    <div class="info">
        <label>Role:</label>
        <span id="role">Loading...</span>
    </div>
    <button class="libraryBtn" id="passwordBtn">Change My Password</button>
    <button class="libraryBtn" id="libraryBtn">Library</button>
    <button class="logoutBtn" id="logoutBtn">Logout</button>
</div>

<script>
    document.addEventListener("DOMContentLoaded", async function(){

        const isloggedin = await fetch('/api/me', {
            method: 'GET',
            credentials: 'include'
        });

        if(!isloggedin.ok){
            window.location.href ="/login";
        }
    
        const welcome = document.getElementById('welcome');
        const username = document.getElementById('username');
        const email = document.getElementById('email');
        const role = document.getElementById('role');
        const id = document.getElementById('id');

        const logoutBtn = document.getElementById('logoutBtn');
        const passwordBtn = document.getElementById('passwordBtn');
        const libraryBtn = document.getElementById('libraryBtn');

        logoutBtn.addEventListener("click", async function(){
            try {
                await fetch('/api/logout', { method: 'POST' });
                window.location.href = '/login'; 
            } catch (err) {
                console.error("Logout failed", err);
            }
        })

        libraryBtn.addEventListener("click", async function(){
            window.location.href = "/library"
        });

        passwordBtn.addEventListener("click", async function(){
            window.location.href = "/password"
        });

        try{
            const response = await fetch('/api/me', {
                method: 'GET',
                credentials: 'include'
        });

            if(response.ok){
                const result = await response.json(); 

                welcome.textContent = result.message;
                role.textContent = result.yourDetails.role;
                username.textContent = result.yourDetails.username;
                email.textContent = result.yourDetails.email;
                id.textContent = result.yourDetails.id;
            }
        }
        catch(error){
            console.error('Error:', error);
        }
});


</script>

</body>
</html>
