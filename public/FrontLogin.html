<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 320px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            
        }

        input {
            width: 94%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Login</h2>

    <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" required>

        <label>Password</label>
        <input type="password" id="password" required>

        <p id="errorMessage" style="color: red;"></p>

        
        <button type="submit">Login</button>
    </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", async function(){
    const isloggedin = await fetch('/api/me', {
            method: 'GET',
            credentials: 'include'
        });

        if(isloggedin.ok){
            window.location.href ="/me";
        }
});

document.getElementById('loginForm').addEventListener('submit', async function(event) {
    event.preventDefault();

    

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    document.getElementById('errorMessage').textContent = '';
    
    try{
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password })
        });

        if(response.ok){
            window.location.href ="/me";
        }
        else{
            const errorData = await response.json();
            document.getElementById('errorMessage').textContent = errorData.message || 'Login failed. Please try again.';
        }
    }
    catch(error){
        console.error('Login error:', error);
        document.getElementById('errorMessage').textContent = 'An error occurred during login. Please try again.';
    }

});
</script>

</body>
</html>
