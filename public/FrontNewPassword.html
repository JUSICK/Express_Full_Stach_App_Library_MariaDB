<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Your Password</title>
     <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 320px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            max-width: 10px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            
        }

        input {
            width: 94%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .buttonUpdate {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }
        input, select, button { padding: 8px; margin: 5px 0; }
        .account { background: #ff4444; color: white; border: none; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div class="container">
    <button class="account" onclick="returnac()">Return to Account</button>

    <h2>Password Update</h2>

    <form id="loginForm">
        <label>Current Password</label>
        <input type="password" id="currentPassword" required>

        <label>New Password</label>
        <input type="password" id="newPassword" required>

        <p id="errorMessage" style="color: red;"></p>

        
        <button class="buttonUpdate" type="submit">Update Password</button>
    </form>
</div>

<script>
    function returnac(){
            window.location.href ="/me"
        }

document.addEventListener("DOMContentLoaded", async function(){

        const isloggedin = await fetch('/api/me', {
            method: 'GET',
            credentials: 'include'
        });

        if(!isloggedin.ok){
            window.location.href ="/login";
        }
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const currentPassword = document.getElementById("currentPassword").value.trim();
        const newPassword = document.getElementById("newPassword").value.trim();
        const errorMessage = document.getElementById("errorMessage");

        errorMessage.textContent = "";

        if (currentPassword === newPassword) {
            errorMessage.textContent = "New password cannot be the same as the current one.";
            return;
        }

        if (newPassword.includes(currentPassword) || currentPassword.includes(newPassword)) {
            errorMessage.textContent = "New password is too similar to the current one.";
            return;
        }


        try {
            const response = await fetch("/api/user/changepassword", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                credentials: "include",
                body: JSON.stringify({
                    currentPassword,
                    newPassword
                })
            });

            const data = await response.json();

            if (response.ok) {
                alert("Password updated successfully");
                window.location.href = "/me";
            } else {
                errorMessage.textContent = data.message || "Password update failed";
            }

        } catch (err) {
            errorMessage.textContent = "Network error. Try again later.";
        }
    });
});
</script>

</body>
</html>
